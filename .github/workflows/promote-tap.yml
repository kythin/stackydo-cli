name: Promote to Public Tap

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to promote (e.g. v0.1.0). Defaults to latest release."
        required: false
        default: ""

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PUBLIC_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(gh api repos/kythin/stackydo-cli/releases/latest --jq '.tag_name')
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Promoting version: $VERSION"

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PUBLIC_TOKEN }}
        run: |
          gh release download "$VERSION" \
            --repo kythin/stackydo-cli \
            --pattern "*.tar.xz" \
            --dir artifacts

      - name: Generate and push formula to public tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PUBLIC_TOKEN }}
        run: |
          CLEAN_VERSION="${VERSION#v}"

          # Compute SHAs from the downloaded artifacts
          SHA_ARM_MAC=$(sha256sum artifacts/stackydo-aarch64-apple-darwin.tar.xz | cut -d ' ' -f 1)
          SHA_INTEL_MAC=$(sha256sum artifacts/stackydo-x86_64-apple-darwin.tar.xz | cut -d ' ' -f 1)
          SHA_ARM_LINUX=$(sha256sum artifacts/stackydo-aarch64-unknown-linux-gnu.tar.xz | cut -d ' ' -f 1)
          SHA_INTEL_LINUX=$(sha256sum artifacts/stackydo-x86_64-unknown-linux-gnu.tar.xz | cut -d ' ' -f 1)

          echo "aarch64-apple-darwin: ${SHA_ARM_MAC}"
          echo "x86_64-apple-darwin: ${SHA_INTEL_MAC}"
          echo "aarch64-unknown-linux-gnu: ${SHA_ARM_LINUX}"
          echo "x86_64-unknown-linux-gnu: ${SHA_INTEL_LINUX}"

          # Get release asset IDs from the GitHub API
          ASSETS=$(gh api repos/kythin/stackydo-cli/releases/tags/${VERSION} --jq '.assets[] | "\(.name) \(.id)"')
          ARM_MAC_ID=$(echo "$ASSETS" | grep "aarch64-apple-darwin.tar.xz " | awk '{print $2}')
          INTEL_MAC_ID=$(echo "$ASSETS" | grep "x86_64-apple-darwin.tar.xz " | awk '{print $2}')
          ARM_LINUX_ID=$(echo "$ASSETS" | grep "aarch64-unknown-linux-gnu.tar.xz " | awk '{print $2}')
          INTEL_LINUX_ID=$(echo "$ASSETS" | grep "x86_64-unknown-linux-gnu.tar.xz " | awk '{print $2}')

          API_BASE="https://api.github.com/repos/kythin/stackydo-cli/releases/assets"

          # Generate the formula
          cat > stackydo.rb << FORMULA
          class Stackydo < Formula
            desc "Context-aware CLI task manager with TUI"
            homepage "https://github.com/kythin/stackydo-cli"
            version "${CLEAN_VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${API_BASE}/${ARM_MAC_ID}",
                    headers: ["Authorization: token #{ENV["HOMEBREW_GITHUB_API_TOKEN"]}", "Accept: application/octet-stream"]
                sha256 "${SHA_ARM_MAC}"
              else
                url "${API_BASE}/${INTEL_MAC_ID}",
                    headers: ["Authorization: token #{ENV["HOMEBREW_GITHUB_API_TOKEN"]}", "Accept: application/octet-stream"]
                sha256 "${SHA_INTEL_MAC}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${API_BASE}/${ARM_LINUX_ID}",
                    headers: ["Authorization: token #{ENV["HOMEBREW_GITHUB_API_TOKEN"]}", "Accept: application/octet-stream"]
                sha256 "${SHA_ARM_LINUX}"
              else
                url "${API_BASE}/${INTEL_LINUX_ID}",
                    headers: ["Authorization: token #{ENV["HOMEBREW_GITHUB_API_TOKEN"]}", "Accept: application/octet-stream"]
                sha256 "${SHA_INTEL_LINUX}"
              end
            end

            def install
              bin.install "stackydo"
              bin.install "stackydo-mcp"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/stackydo --version")
            end
          end
          FORMULA

          # Fix indentation from heredoc
          sed -i 's/^          //' stackydo.rb

          # Push to public tap repo via GitHub API
          EXISTING_SHA=$(gh api repos/kythin/homebrew-tap/contents/Formula/stackydo.rb --jq '.sha' 2>/dev/null || echo "")

          CONTENT=$(base64 -w 0 stackydo.rb)

          if [ -n "$EXISTING_SHA" ]; then
            gh api repos/kythin/homebrew-tap/contents/Formula/stackydo.rb \
              --method PUT \
              -f message="Promote stackydo to ${VERSION}" \
              -f content="${CONTENT}" \
              -f sha="${EXISTING_SHA}" \
              --silent
          else
            gh api repos/kythin/homebrew-tap/contents/Formula/stackydo.rb \
              --method PUT \
              -f message="Promote stackydo to ${VERSION}" \
              -f content="${CONTENT}" \
              --silent
          fi

          echo "Formula promoted to public tap successfully"
          echo "### Promoted stackydo ${VERSION} to public tap" >> "$GITHUB_STEP_SUMMARY"
