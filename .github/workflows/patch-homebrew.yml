name: Update Homebrew Tap
on:
  release:
    types: [published]
jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Download release archives from source repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          gh release download "$VERSION" \
            --repo kythin/stackydo-cli \
            --pattern "*.tar.xz" \
            --dir artifacts

      - name: Upload binaries to beta tap release and update formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_BETA_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          CLEAN_VERSION="${VERSION#v}"
          TAP_TAG="stackydo-${VERSION}"

          # Compute SHAs from the build artifacts
          SHA_ARM_MAC=$(sha256sum artifacts/stackydo-aarch64-apple-darwin.tar.xz | cut -d ' ' -f 1)
          SHA_INTEL_MAC=$(sha256sum artifacts/stackydo-x86_64-apple-darwin.tar.xz | cut -d ' ' -f 1)
          SHA_ARM_LINUX=$(sha256sum artifacts/stackydo-aarch64-unknown-linux-gnu.tar.xz | cut -d ' ' -f 1)
          SHA_INTEL_LINUX=$(sha256sum artifacts/stackydo-x86_64-unknown-linux-gnu.tar.xz | cut -d ' ' -f 1)

          echo "aarch64-apple-darwin: ${SHA_ARM_MAC}"
          echo "x86_64-apple-darwin: ${SHA_INTEL_MAC}"
          echo "aarch64-unknown-linux-gnu: ${SHA_ARM_LINUX}"
          echo "x86_64-unknown-linux-gnu: ${SHA_INTEL_LINUX}"

          # Create release in tap repo (or upload to existing)
          if gh release view "$TAP_TAG" --repo kythin/homebrew-tap-beta &>/dev/null; then
            gh release upload "$TAP_TAG" --repo kythin/homebrew-tap-beta --clobber \
              artifacts/stackydo-*.tar.xz
          else
            gh release create "$TAP_TAG" \
              --repo kythin/homebrew-tap-beta \
              --title "stackydo ${VERSION}" \
              --notes "stackydo ${VERSION} binaries" \
              artifacts/stackydo-*.tar.xz
          fi

          # Get asset IDs from tap repo release
          ASSETS=$(gh api repos/kythin/homebrew-tap-beta/releases/tags/${TAP_TAG} --jq '.assets[] | "\(.name) \(.id)"')
          ARM_MAC_ID=$(echo "$ASSETS" | grep "aarch64-apple-darwin.tar.xz " | awk '{print $2}')
          INTEL_MAC_ID=$(echo "$ASSETS" | grep "x86_64-apple-darwin.tar.xz " | awk '{print $2}')
          ARM_LINUX_ID=$(echo "$ASSETS" | grep "aarch64-unknown-linux-gnu.tar.xz " | awk '{print $2}')
          INTEL_LINUX_ID=$(echo "$ASSETS" | grep "x86_64-unknown-linux-gnu.tar.xz " | awk '{print $2}')

          API_BASE="https://api.github.com/repos/kythin/homebrew-tap-beta/releases/assets"

          # Generate the formula
          cat > stackydo.rb << FORMULA
          class Stackydo < Formula
            desc "Context-aware CLI task manager with TUI"
            homepage "https://github.com/kythin/stackydo-cli"
            version "${CLEAN_VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${API_BASE}/${ARM_MAC_ID}",
                    headers: ["Authorization: token #{ENV["HOMEBREW_GITHUB_API_TOKEN"]}", "Accept: application/octet-stream"]
                sha256 "${SHA_ARM_MAC}"
              else
                url "${API_BASE}/${INTEL_MAC_ID}",
                    headers: ["Authorization: token #{ENV["HOMEBREW_GITHUB_API_TOKEN"]}", "Accept: application/octet-stream"]
                sha256 "${SHA_INTEL_MAC}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${API_BASE}/${ARM_LINUX_ID}",
                    headers: ["Authorization: token #{ENV["HOMEBREW_GITHUB_API_TOKEN"]}", "Accept: application/octet-stream"]
                sha256 "${SHA_ARM_LINUX}"
              else
                url "${API_BASE}/${INTEL_LINUX_ID}",
                    headers: ["Authorization: token #{ENV["HOMEBREW_GITHUB_API_TOKEN"]}", "Accept: application/octet-stream"]
                sha256 "${SHA_INTEL_LINUX}"
              end
            end

            def install
              bin.install "stackydo"
              bin.install "stackydo-mcp"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/stackydo --version")
            end
          end
          FORMULA

          # Fix indentation from heredoc
          sed -i 's/^          //' stackydo.rb

          # Push formula to beta tap repo via GitHub API
          EXISTING_SHA=$(gh api repos/kythin/homebrew-tap-beta/contents/Formula/stackydo.rb --jq '.sha' 2>/dev/null || echo "")

          CONTENT=$(base64 -w 0 stackydo.rb)

          if [ -n "$EXISTING_SHA" ]; then
            gh api repos/kythin/homebrew-tap-beta/contents/Formula/stackydo.rb \
              --method PUT \
              -f message="Update stackydo to ${VERSION}" \
              -f content="${CONTENT}" \
              -f sha="${EXISTING_SHA}" \
              --silent
          else
            gh api repos/kythin/homebrew-tap-beta/contents/Formula/stackydo.rb \
              --method PUT \
              -f message="Update stackydo to ${VERSION}" \
              -f content="${CONTENT}" \
              --silent
          fi

          echo "Binaries and formula updated in beta tap successfully"
