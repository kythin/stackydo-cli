name: Patch Homebrew Formula
on:
  release:
    types: [published]
jobs:
  patch-formula:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Download formula from release
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --repo kythin/stackydo-cli \
            --pattern "stackydo.rb" \
            --dir formula
      - name: Get asset IDs and patch formula
        run: |
          TAG="${{ github.event.release.tag_name }}"
          FORMULA="formula/stackydo.rb"

          # Get asset IDs for each platform archive
          ASSETS=$(gh api "repos/kythin/stackydo-cli/releases/tags/$TAG" \
            --jq '.assets[] | select(.name | test("tar\\.xz$")) | "\(.name) \(.id)"')

          # For each url line pointing to a release download, replace with
          # GitHub API asset URL + auth headers for private repo access
          python3 << PYEOF
          import re

          with open("$FORMULA") as f:
              content = f.read()

          assets = {}
          for line in """$ASSETS""".strip().split("\n"):
              name, asset_id = line.rsplit(" ", 1)
              assets[name] = asset_id

          def replace_url(match):
              indent = match.group(1)
              filename = match.group(2)
              asset_id = assets.get(filename)
              if not asset_id:
                  return match.group(0)  # no replacement
              api_url = f"https://api.github.com/repos/kythin/stackydo-cli/releases/assets/{asset_id}"
              return (
                  f'{indent}url "{api_url}",\n'
                  f'{indent}    headers: ["Accept: application/octet-stream",'
                  f' "Authorization: token #{{ENV.fetch(\\"HOMEBREW_GITHUB_API_TOKEN\\", \\"\\")}}"]'
              )

          pattern = r'(\s+)url "https://github\.com/kythin/stackydo-cli/releases/download/[^/]+/([^"]+)"'
          new_content = re.sub(pattern, replace_url, content)

          with open("$FORMULA", "w") as f:
              f.write(new_content)

          print("Patched formula with asset URLs")
          PYEOF
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: kythin/homebrew-stackydo
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Update formula in tap
        run: |
          mkdir -p tap/Formula
          cp formula/stackydo.rb tap/Formula/stackydo.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update stackydo to ${{ github.event.release.tag_name }}"
            git push
          fi
